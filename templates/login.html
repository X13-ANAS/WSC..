<!DOCTYPE html>
<html>
<head>
    <title>Login - WS Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#03050a">
    <link rel="apple-touch-icon" href="/static/WS.jpg">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --accent: #3b82f6;          
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --panel-bg: rgba(13, 17, 23, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --inner-glow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; 
            background-color: #030508; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), url('/static/WS.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; color: var(--text-primary); overflow: hidden;
        }
        .auth-box { 
            position: relative; z-index: 1; background: var(--panel-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--panel-border); border-radius: 24px; padding: 48px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), var(--inner-glow); animation: authEntrance 0.8s var(--ease-out) forwards;
        }
        .auth-box h2 { text-align: center; margin-bottom: 32px; font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px;}
        .flash-msg { background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--danger); color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-weight: 500;}
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 14px 16px; font-size: 15px; color: #fff; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 12px; outline: none; transition: 0.2s var(--ease-out); }
        .input-group input:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .input-group input::placeholder { color: var(--text-secondary); }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s var(--ease-out); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); margin-top: 10px;}
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
        .link-container { text-align: center; margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
        .link { color: var(--text-secondary); text-decoration: none; font-size: 14px; transition: 0.2s; font-weight: 500;}
        .link span { color: var(--accent); font-weight: 600; }
        .link:hover span { text-decoration: underline; }
        @keyframes authEntrance { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @media (max-width: 480px) { .auth-box { padding: 32px 24px; border-radius: 20px; } .auth-box h2 { font-size: 24px; margin-bottom: 24px; } .input-group input { font-size: 16px !important; } }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Welcome Back</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
       <div class="link-container">
            <a href="/register" class="link">Don't have an account? <span>Register here</span></a>
                    </div>
    </div>
</body>
</html>
